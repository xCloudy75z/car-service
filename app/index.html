<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; font-src 'self'; manifest-src 'self'; worker-src 'self'; base-uri 'none'; form-action 'none'; object-src 'none'" />
  <title>Car Service History</title>

  <meta name="theme-color" content="#b45816" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Service History" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="manifest" href="manifest.webmanifest" />

  <link rel="stylesheet" href="styles/cognac.css" />
</head>
<body>
  <div id="app-root">
    <main id="app" role="tabpanel" aria-labelledby="tab-history" aria-live="off"></main>

    <button class="fab" id="fab" type="button" aria-label="Add service"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg></button>

    <nav class="tabbar" role="tablist" aria-label="Main sections">
      <button class="tab active" type="button" role="tab" id="tab-history" aria-controls="app" data-tab="history" aria-selected="true">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18M3 12h18M3 18h18"/></svg>History</button>
      <button class="tab" type="button" role="tab" id="tab-due" aria-controls="app" data-tab="due" aria-selected="false">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 8v4l3 2"/><circle cx="12" cy="12" r="9"/></svg>Maintenance</button>
      <button class="tab" type="button" role="tab" id="tab-insights" aria-controls="app" data-tab="insights" aria-selected="false">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19V11M10 19V5M16 19v-6M22 19H2"/></svg>Insights</button>
    </nav>
  </div>

  <!-- Live regions live OUTSIDE #app-root so they stay announced/interactive while a modal sheet makes the background inert. -->
  <div id="toast-polite" class="toast-host" aria-live="polite" aria-atomic="true"></div>
  <div id="toast-assertive" class="toast-host" role="alert" aria-live="assertive" aria-atomic="true"></div>

  <div id="sheet-layer"></div>

  <script type="module" src="app.js"></script>
  <script type="module" src="register-sw.js"></script>
</body>
</html>
