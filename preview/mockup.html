<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Car Service History — Interactive Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<script>(function(){try{var t=localStorage.getItem('csh-hub-theme');if(!t)t='light';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<style>
  :root{
    --bg:#e9edf4; --card:#ffffff; --card2:#f6f8fc; --ink:#111620; --muted:#6a7482; --faint:#9aa4b2;
    --line:#e4e9f1; --accent:#2551f5; --accent-soft:#e7edff; --accent-ink:#fff;
    --green:#12a150; --green-soft:#e3f6ec; --amber:#e08600; --amber-soft:#fdf0d9; --red:#e5484d; --red-soft:#fdeaea; --grey:#9aa4b2; --grey-soft:#eef1f5;
    --shadow:0 20px 50px rgba(20,30,55,.16); --shadow-sm:0 2px 8px rgba(20,30,55,.06);
    --fd:"Space Grotesk",system-ui,sans-serif; --fb:"Inter",system-ui,sans-serif; --fm:"JetBrains Mono",ui-monospace,monospace;
    color-scheme:light;
  }
  :root[data-theme="dark"]{
    --bg:#0b0e13; --card:#141922; --card2:#1a212c; --ink:#eef2f8; --muted:#8b95a3; --faint:#5c6675;
    --line:#232c39; --accent:#5b82ff; --accent-soft:#17233f; --accent-ink:#fff;
    --green:#3ecf7f; --green-soft:#12291d; --amber:#f0ad4e; --amber-soft:#2c2410; --red:#f0696d; --red-soft:#2c1618; --grey:#7a8494; --grey-soft:#1c2430;
    --shadow:0 22px 56px rgba(0,0,0,.6); --shadow-sm:0 2px 10px rgba(0,0,0,.4);
    color-scheme:dark;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:var(--fb);color:var(--ink);min-height:100vh;
    background:radial-gradient(1100px 520px at 50% -8%,color-mix(in srgb,var(--accent) 16%,transparent),transparent),var(--bg);
    display:flex;flex-direction:column;align-items:center;padding:26px 14px 56px;transition:background-color .3s,color .3s}
  .kicker{color:var(--muted);font-size:13px;margin:0 0 16px;text-align:center;max-width:440px;line-height:1.5}
  .kicker b{color:var(--accent)}
  .theme-toggle{position:fixed;top:16px;right:16px;z-index:200;width:44px;height:44px;border-radius:50%;
    border:1px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer;font-size:19px;
    box-shadow:var(--shadow-sm);display:grid;place-items:center;transition:transform .2s}
  .theme-toggle:hover{transform:rotate(-16deg) scale(1.06)}
  .theme-toggle .sun{display:none}:root[data-theme="dark"] .theme-toggle .sun{display:block}
  :root[data-theme="dark"] .theme-toggle .moon{display:none}

  /* Phone */
  .phone{width:392px;max-width:100%;height:820px;max-height:calc(100vh - 30px);background:var(--card);
    border-radius:50px;box-shadow:var(--shadow),0 0 0 11px #0c1017,0 0 0 13px #23303f;
    position:relative;overflow:hidden;display:flex;flex-direction:column}
  .island{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:112px;height:32px;background:#05070b;border-radius:20px;z-index:80}
  .screen{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
  .statusbar{height:52px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 30px 7px;font-size:14px;font-weight:600;flex:none}
  .statusbar .r{display:flex;gap:6px;align-items:center;font-size:13px}
  .body{flex:1;overflow-y:auto;padding:4px 16px 104px}
  .body::-webkit-scrollbar{width:0}

  h1.title{font-family:var(--fd);font-weight:700;font-size:27px;margin:8px 2px 1px;letter-spacing:-.02em}
  .sub{color:var(--muted);font-size:12.5px;margin:0 2px 14px}
  .mono{font-family:var(--fm);font-variant-numeric:tabular-nums}
  .muted{color:var(--muted)} .tiny{font-size:11.5px} .faint{color:var(--faint)}

  /* Car header */
  .carhead{background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 55%,#7aa2ff));
    color:#fff;border-radius:22px;padding:17px 18px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;margin:6px 0 16px}
  .carhead::after{content:"🔧";position:absolute;right:-8px;bottom:-14px;font-size:92px;opacity:.13;transform:rotate(-18deg)}
  .carhead .nick{font-family:var(--fd);font-weight:700;font-size:20px;letter-spacing:-.01em}
  .carhead .mm{opacity:.85;font-size:12.5px;margin-top:1px}
  .carhead .odo{margin-top:14px;display:flex;align-items:baseline;gap:7px}
  .carhead .odo .v{font-family:var(--fm);font-weight:700;font-size:26px}
  .carhead .odo .k{opacity:.8;font-size:11px;text-transform:uppercase;letter-spacing:.08em}
  .gear{position:absolute;top:14px;right:14px;z-index:2;width:34px;height:34px;border-radius:50%;background:#ffffff2b;border:0;color:#fff;font-size:16px;cursor:pointer}

  /* Section label */
  .slab{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--faint);margin:16px 4px 9px;display:flex;align-items:center;justify-content:space-between}
  .slab a{color:var(--accent);text-decoration:none;font-weight:700;letter-spacing:0;text-transform:none}

  /* Next-due strip */
  .strip{display:flex;gap:11px;overflow-x:auto;padding:2px 2px 6px;margin:0 -2px}
  .strip::-webkit-scrollbar{height:0}
  .due{flex:0 0 auto;width:158px;background:var(--card);border:1px solid var(--line);border-left-width:4px;border-radius:16px;padding:13px 14px;box-shadow:var(--shadow-sm)}
  .due .ico{font-size:20px} .due .nm{font-weight:700;font-size:14px;margin:6px 0 3px}
  .due .st{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:3px 8px;border-radius:999px}
  .due .sub2{font-size:11px;color:var(--muted);margin-top:6px}
  .s-ok{border-left-color:var(--green)} .s-ok .st{background:var(--green-soft);color:var(--green)}
  .s-soon{border-left-color:var(--amber)} .s-soon .st{background:var(--amber-soft);color:var(--amber)}
  .s-over{border-left-color:var(--red)} .s-over .st{background:var(--red-soft);color:var(--red)}
  .s-none{border-left-color:var(--grey)} .s-none .st{background:var(--grey-soft);color:var(--muted)}

  /* Stats */
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:13px 14px;box-shadow:var(--shadow-sm)}
  .stat .k{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--faint)}
  .stat .v{font-family:var(--fm);font-weight:700;font-size:20px;margin-top:3px}

  /* Search + chips */
  .search{width:100%;padding:11px 14px;border:1px solid var(--line);border-radius:13px;background:var(--card);color:var(--ink);font-size:14px;font-family:inherit;margin:2px 0 10px}
  .search:focus{outline:2px solid var(--accent);border-color:var(--accent)}
  .chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin:0 -2px}
  .chips::-webkit-scrollbar{height:0}
  .chip{flex:0 0 auto;border:1px solid var(--line);background:var(--card);color:var(--muted);font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:999px;cursor:pointer;transition:.15s}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff}

  /* Timeline card */
  .entry{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px 14px;margin-bottom:11px;box-shadow:var(--shadow-sm);cursor:pointer;transition:.15s}
  .entry:active{transform:scale(.99)}
  .entry .r1{display:flex;align-items:center;gap:10px}
  .entry .tagline{font-weight:700;font-size:14.5px;flex:1;line-height:1.25}
  .entry .cost{font-family:var(--fm);font-weight:700;font-size:14.5px}
  .entry .r2{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:12px;margin-top:6px;flex-wrap:wrap}
  .entry .dot{width:3px;height:3px;border-radius:50%;background:var(--faint)}
  .entry .jobs{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
  .jtag{font-size:11px;font-weight:600;padding:3px 8px;border-radius:8px;background:var(--card2);color:var(--muted);border:1px solid var(--line)}
  .entry .notes{margin-top:10px;font-size:12.5px;color:var(--muted);border-top:1px dashed var(--line);padding-top:9px;display:none}
  .entry.open .notes{display:block}
  .entry .actions{margin-top:10px;display:none;gap:8px}
  .entry.open .actions{display:flex}
  .mini{border:1px solid var(--line);background:var(--card2);color:var(--muted);font-size:12px;font-weight:600;padding:6px 11px;border-radius:9px;cursor:pointer}
  .mini.del{color:var(--red);border-color:color-mix(in srgb,var(--red) 30%,var(--line))}

  /* Maintenance rows */
  .mrow{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:11px;box-shadow:var(--shadow-sm)}
  .mrow .h{display:flex;align-items:center;gap:10px}
  .mrow .ico{font-size:20px} .mrow .nm{font-weight:700;font-size:15px;flex:1}
  .mrow .st{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:4px 9px;border-radius:999px}
  .mrow .bar{height:8px;border-radius:999px;background:var(--card2);overflow:hidden;margin:11px 0 7px;border:1px solid var(--line)}
  .mrow .bar>i{display:block;height:100%;border-radius:999px}
  .mrow .meta{font-size:11.5px;color:var(--muted);display:flex;justify-content:space-between}
  .mrow .cap{font-size:11px;color:var(--amber);margin-top:8px;display:flex;align-items:center;gap:5px}
  .anchor{font-size:10.5px;color:var(--faint);font-style:italic;margin-top:4px}

  /* Tab bar + FAB */
  .tabbar{position:absolute;left:0;right:0;bottom:0;height:82px;background:color-mix(in srgb,var(--card) 88%,transparent);
    backdrop-filter:blur(14px);border-top:1px solid var(--line);display:flex;padding:9px 8px 22px;z-index:50}
  .tab{flex:1;border:0;background:none;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--faint);font-size:10.5px;font-weight:700;cursor:pointer;padding-top:6px}
  .tab svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
  .tab.active{color:var(--accent)}
  .fab{position:absolute;right:18px;bottom:96px;z-index:55;width:58px;height:58px;border-radius:19px;border:0;cursor:pointer;
    background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 60%,#7aa2ff));color:#fff;font-size:28px;
    box-shadow:0 10px 24px color-mix(in srgb,var(--accent) 45%,transparent);display:grid;place-items:center;transition:transform .15s}
  .fab:active{transform:scale(.92)}

  /* Sheet */
  .sheet{position:absolute;inset:0;background:var(--card);z-index:65;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .32s cubic-bezier(.2,.8,.2,1)}
  .sheet.show{transform:translateY(0)}
  .sh-head{padding:16px 18px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line)}
  .sh-head .t{font-family:var(--fd);font-weight:700;font-size:18px}
  .sh-body{flex:1;overflow-y:auto;padding:16px 18px 24px}
  .x{margin-left:auto;background:var(--card2);border:0;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;color:var(--muted)}
  label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin:14px 2px 6px}
  input,select,textarea{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:12px;font-size:16px;background:var(--card);color:var(--ink);font-family:inherit}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--accent);border-color:var(--accent)}
  .row{display:flex;gap:10px}.row>*{flex:1}
  .warn{margin-top:7px;font-size:11.5px;color:var(--amber);background:var(--amber-soft);padding:8px 11px;border-radius:10px;display:none;align-items:flex-start;gap:6px}
  .warn.show{display:flex}
  .jobpick{display:flex;flex-wrap:wrap;gap:8px}
  .jp{border:1px solid var(--line);background:var(--card);color:var(--muted);font-size:13px;font-weight:600;padding:8px 12px;border-radius:11px;cursor:pointer;user-select:none;display:flex;align-items:center;gap:6px}
  .jp.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}
  .btn{width:100%;border:0;border-radius:14px;padding:15px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}
  .btn-primary{background:var(--accent);color:#fff} .btn-primary:active{filter:brightness(.94)}
  .btn-lite{background:var(--card2);color:var(--ink);border:1px solid var(--line)}

  /* settings bits */
  .setrow{display:flex;align-items:center;gap:12px;padding:14px 2px;border-bottom:1px solid var(--line)}
  .setrow:last-child{border-bottom:0}
  .setrow .l{flex:1} .setrow .l .n{font-weight:600;font-size:14px} .setrow .l .d{font-size:11.5px;color:var(--muted)}
  .switch{width:46px;height:28px;border-radius:999px;background:var(--line);position:relative;transition:.15s;flex:none;cursor:pointer;border:0}
  .switch.on{background:var(--accent)}
  .switch i{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:.15s}
  .switch.on i{left:21px}
  .backup{background:var(--green-soft);border:1px solid color-mix(in srgb,var(--green) 30%,var(--line));border-radius:14px;padding:13px 14px;display:flex;align-items:center;gap:11px;margin-bottom:14px}
  .backup .ic{font-size:22px}

  /* Toast + Undo */
  .toast{position:absolute;left:50%;bottom:100px;transform:translateX(-50%) translateY(18px);opacity:0;
    background:#0d1420;color:#fff;padding:12px 16px;border-radius:13px;font-size:13.5px;font-weight:600;
    transition:.25s;z-index:75;pointer-events:none;display:flex;align-items:center;gap:12px;box-shadow:0 10px 30px rgba(0,0,0,.35)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
  .toast button{background:none;border:0;color:#7fb0ff;font-weight:800;font-size:13.5px;cursor:pointer;font-family:inherit}

  /* Splash */
  .splash{position:absolute;inset:0;z-index:120;background:linear-gradient(160deg,#14224a,#22409e 60%,#2551f5);
    display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;transition:.45s}
  .splash.hide{opacity:0;transform:scale(1.05);pointer-events:none}
  .splash .logo{font-family:var(--fd);font-weight:700;font-size:30px;letter-spacing:-.01em;display:flex;align-items:center;gap:9px}
  .splash .gauge{margin:26px 0 8px;width:150px;height:150px;position:relative}
  .splash .num{font-family:var(--fm);font-weight:700;font-size:34px}
  .splash .lbl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;opacity:.7;margin-top:2px}
  .splash .go{margin-top:34px;background:#fff;color:#14224a;border:0;border-radius:14px;padding:14px 26px;font-weight:800;font-size:15px;cursor:pointer;font-family:inherit;opacity:0;transform:translateY(10px);transition:.4s}
  .splash .go.show{opacity:1;transform:none}
  .splash .cap{position:absolute;bottom:26px;font-size:11px;opacity:.7;text-align:center;padding:0 30px}

  .empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:13.5px}
  .backlink{margin-top:18px;font-size:13px;text-align:center}
  .backlink a{color:var(--accent);font-weight:700;text-decoration:none}
  @media(max-width:430px){.theme-toggle{top:10px;right:10px}}
</style>
</head>
<body>
  <button class="theme-toggle" aria-label="Toggle light/dark" onclick="toggleTheme()"><span class="moon">🌙</span><span class="sun">☀️</span></button>
  <p class="kicker">📱 <b>Car Service History</b> — tap around a real prototype with <b>fake sample data</b>. Add a service and watch the <b>“next due” predictions recompute live</b>.</p>

  <div class="phone">
    <div class="island"></div>
    <div class="screen">

      <!-- SPLASH -->
      <div class="splash" id="splash">
        <div class="logo">🔧 Service History</div>
        <div class="gauge">
          <svg viewBox="0 0 120 120" style="width:100%;height:100%">
            <circle cx="60" cy="60" r="52" fill="none" stroke="#ffffff26" stroke-width="8"/>
            <circle id="gArc" cx="60" cy="60" r="52" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round"
              stroke-dasharray="327" stroke-dashoffset="327" transform="rotate(-90 60 60)"/>
          </svg>
          <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
            <div class="num" id="odoRoll">0</div><div class="lbl">km</div>
          </div>
        </div>
        <button class="go" id="splashGo" onclick="enterApp()">Open garage →</button>
        <div class="cap">Offline · private · your data never leaves the device</div>
      </div>

      <div class="statusbar"><span>9:41</span><span class="r">􀙇 􀺤 <span class="mono">100</span></span></div>
      <div class="body" id="body"></div>

      <button class="fab" id="fab" onclick="openAdd()" aria-label="Add service">+</button>
      <div class="toast" id="toast"></div>

      <div class="sheet" id="sheet">
        <div class="sh-head"><span class="t" id="sheetTitle">Add service</span><button class="x" onclick="closeSheet()">✕</button></div>
        <div class="sh-body" id="sheetBody"></div>
      </div>

      <nav class="tabbar">
        <button class="tab active" data-tab="history" onclick="go('history')">
          <svg viewBox="0 0 24 24"><path d="M3 5h18M3 12h18M3 19h18"/><circle cx="7" cy="5" r="0.5"/></svg>History</button>
        <button class="tab" data-tab="due" onclick="go('due')">
          <svg viewBox="0 0 24 24"><path d="M12 8v4l3 2"/><circle cx="12" cy="12" r="9"/></svg>Maintenance</button>
        <button class="tab" data-tab="insights" onclick="go('insights')">
          <svg viewBox="0 0 24 24"><path d="M4 19V11M10 19V5M16 19v-6M22 19H2"/></svg>Insights</button>
      </nav>

    </div>
  </div>

  <p class="backlink"><a href="../index.html">← Back to hub</a> &nbsp;·&nbsp; <a href="spec.html">Read the spec →</a> &nbsp;·&nbsp; <a href="review.html">See the review →</a></p>

<script>
/* ============ STATE (fake sample data) ============ */
const JOBS={
  oil:{label:"Engine oil",icon:"🛢️"}, air_filter:{label:"Air filter",icon:"💨"},
  cabin_filter:{label:"Cabin filter",icon:"❄️"}, brake_fluid:{label:"Brake fluid",icon:"🛑"},
  spark_plugs:{label:"Spark plugs",icon:"⚡"}, brakes:{label:"Brakes",icon:"🅿️"},
  tires:{label:"Tyres",icon:"🛞"}, battery:{label:"Battery",icon:"🔋"},
  transmission:{label:"Transmission",icon:"⚙️"}, suspension:{label:"Suspension",icon:"🔩"}, engine:{label:"Engine",icon:"🚗"}
};
const INTERVALS={
  oil:{km:10000}, air_filter:{km:20000}, cabin_filter:{km:20000,timeHint:12},
  brake_fluid:{km:40000,timeHint:24}, spark_plugs:{km:100000}
};
let uid=100;
const state={
  car:{nick:"My Corolla",make:"Toyota",model:"Corolla",year:2019,plate:"Dubai · A 12345",currency:"AED"},
  baselines:{},
  entries:[
    {id:1,date:"2026-06-10",odometer:57800,workshop:"Al-Futtaim Toyota",cost:320,tags:["air_filter"],notes:"Air filter + AC cabin check. All good."},
    {id:2,date:"2026-03-22",odometer:53400,workshop:"ABC Auto Care",cost:780,tags:["brakes","brake_fluid"],notes:"Rear pads replaced + full brake-fluid flush."},
    {id:3,date:"2025-11-08",odometer:48200,workshop:"Speedy Lube",cost:150,tags:["oil"],notes:"Oil & filter change."},
    {id:4,date:"2025-05-14",odometer:41000,workshop:"Al-Futtaim Toyota",cost:360,tags:["oil"],notes:"Routine service."},
    {id:5,date:"2024-12-01",odometer:33500,workshop:"Corner Garage",cost:1150,tags:["tires","cabin_filter"],notes:"4× new Michelin tyres + cabin filter."},
    {id:6,date:"2024-06-18",odometer:27000,workshop:"Speedy Lube",cost:150,tags:["oil"],notes:"Oil change."}
  ]
};
let filterTag=null, searchQ="", lastDeleted=null, undoTimer=null;

/* ============ COMPUTE (the live engine) ============ */
const live=()=>state.entries.filter(e=>!e.deleted);
function currentKm(){const o=live().map(e=>e.odometer).filter(x=>x!=null);return o.length?Math.max(...o):0;}
function lastDone(tag){
  const es=live().filter(e=>e.tags.includes(tag)&&e.odometer!=null);
  if(es.length)return es.reduce((a,b)=>b.odometer>a.odometer?b:a);
  if(state.baselines[tag])return {odometer:state.baselines[tag],anchor:true};
  return null;
}
function predict(tag){
  const iv=INTERVALS[tag],ld=lastDone(tag),cur=currentKm();
  if(!ld)return {status:"none",iv};
  const next=ld.odometer+iv.km,rem=next-cur,soon=Math.min(iv.km*0.1,1000);
  const status=rem<=0?"over":rem<=soon?"soon":"ok";
  const pct=Math.max(0,Math.min(100,((cur-ld.odometer)/iv.km)*100));
  return {status,rem,next,pct,anchor:ld.anchor,timeHint:iv.timeHint,since:cur-ld.odometer,iv};
}
const STt={ok:{cls:"s-ok",mk:"✓",w:"OK"},soon:{cls:"s-soon",mk:"▲",w:"Due soon"},over:{cls:"s-over",mk:"!",w:"Overdue"},none:{cls:"s-none",mk:"○",w:"Not logged"}};
function statusLine(tag){
  const p=predict(tag),s=STt[p.status];
  if(p.status==="none")return {s,txt:"Not logged yet",p};
  if(p.status==="over")return {s,txt:"Overdue by "+fmt(-p.rem)+" km",p};
  if(p.status==="soon")return {s,txt:"Due soon · in "+fmt(p.rem)+" km",p};
  return {s,txt:"OK · in "+fmt(p.rem)+" km",p};
}
function fmt(n){return Math.round(n).toLocaleString("en-US");}
function money(n){return state.car.currency+" "+Number(n).toLocaleString("en-US");}
function niceDate(d){const[y,m,da]=d.split("-");return da+" "+["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][+m-1]+" "+y;}

/* ============ VIEWS ============ */
const body=document.getElementById("body");
function go(tab){
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.tab===tab));
  document.getElementById("fab").style.display = tab==="history" ? "grid" : "none";
  body.scrollTop=0; body.innerHTML=VIEWS[tab]();
}
const VIEWS={
  history:()=>{
    let list=live().slice().sort((a,b)=>b.date.localeCompare(a.date));
    if(filterTag)list=list.filter(e=>e.tags.includes(filterTag));
    if(searchQ){const q=searchQ.toLowerCase();list=list.filter(e=>e.workshop.toLowerCase().includes(q)||e.notes.toLowerCase().includes(q)||e.tags.some(t=>JOBS[t].label.toLowerCase().includes(q)));}
    const chips=Object.keys(JOBS).filter(t=>live().some(e=>e.tags.includes(t)));
    return carHead()+
      `<div class="slab">Next due <a onclick="go('due')">See all ›</a></div>`+ dueStrip()+
      `<div class="slab">Service history</div>
       <input class="search" placeholder="Search workshop, notes, job…" value="${searchQ}" oninput="searchQ=this.value;refreshHistoryList()">
       <div class="chips">
         <button class="chip ${!filterTag?'on':''}" onclick="setFilter(null)">All</button>
         ${chips.map(t=>`<button class="chip ${filterTag===t?'on':''}" onclick="setFilter('${t}')">${JOBS[t].icon} ${JOBS[t].label}</button>`).join("")}
       </div>
       <div id="hlist">${list.length?list.map(entryCard).join(""):`<div class="empty">No services match.</div>`}</div>`;
  },
  due:()=>{
    return `<h1 class="title">Maintenance</h1><p class="sub">Based on current mileage <b class="mono">${fmt(currentKm())} km</b> — from your latest entry.</p>`+
      Object.keys(INTERVALS).map(mrow).join("")+
      `<p class="tiny faint" style="text-align:center;margin-top:6px">Predictions use only services logged here. Add a “last done” anchor for a used car.</p>`;
  },
  insights:()=>{
    const es=live(); const total=es.reduce((s,e)=>s+e.cost,0);
    const thisY=es.filter(e=>e.date.startsWith("2026")).reduce((s,e)=>s+e.cost,0);
    const yrs=Math.max(1,(new Date(es.map(e=>e.date).sort().at(-1))-new Date(es.map(e=>e.date).sort()[0]))/3.15576e10);
    const avg=total/yrs;
    const byJob={}; es.forEach(e=>e.tags.forEach(t=>byJob[t]=(byJob[t]||0)+e.cost/e.tags.length));
    const top=Object.entries(byJob).sort((a,b)=>b[1]-a[1]).slice(0,5);const mx=Math.max(...top.map(t=>t[1]));
    const pal=["#2551f5","#12a150","#e08600","#a855f7","#ec4899"];
    return `<h1 class="title">Insights</h1><p class="sub">What this car has cost you.</p>
      <div class="stats">
        <div class="stat"><div class="k">Total spent</div><div class="v">${money(total)}</div></div>
        <div class="stat"><div class="k">This year</div><div class="v">${money(thisY)}</div></div>
        <div class="stat"><div class="k">Services</div><div class="v">${es.length}</div></div>
        <div class="stat"><div class="k">Avg / year</div><div class="v">${money(Math.round(avg))}</div></div>
      </div>
      <div class="slab" style="margin-top:20px">Where the money went</div>
      <div class="stat" style="padding:15px 15px 7px">
        ${top.map((t,i)=>`<div class="catrow" style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span>${JOBS[t[0]].icon} ${JOBS[t[0]].label}</span><span class="mono muted">${money(Math.round(t[1]))}</span></div>
          <div class="bar" style="background:var(--card2)"><i style="width:${(t[1]/mx*100)}%;background:${pal[i]}"></i></div></div>`).join("")}
      </div>`;
  }
};
function carHead(){return `<div class="carhead">
   <button class="gear" onclick="openSettings()">⚙️</button>
   <div class="nick">${state.car.nick}</div>
   <div class="mm">${state.car.year} ${state.car.make} ${state.car.model} · ${state.car.plate}</div>
   <div class="odo"><span class="v">${fmt(currentKm())}</span><span class="k">km · current</span></div>
 </div>`;}
function dueStrip(){
  const items=Object.keys(INTERVALS).map(t=>({t,...statusLine(t)}));
  const order={over:0,soon:1,ok:2,none:3};
  items.sort((a,b)=>order[a.p.status]-order[b.p.status]);
  return `<div class="strip">${items.map(it=>`
    <div class="due ${it.s.cls}">
      <div class="ico">${JOBS[it.t].icon}</div>
      <div class="nm">${JOBS[it.t].label}</div>
      <span class="st">${it.s.mk} ${it.s.w}</span>
      <div class="sub2">${it.p.status==="none"?"add to predict":it.p.status==="over"?fmt(-it.p.rem)+" km over":"in "+fmt(it.p.rem)+" km"}</div>
    </div>`).join("")}</div>`;
}
function entryCard(e){
  return `<div class="entry" onclick="this.classList.toggle('open')">
    <div class="r1"><div class="tagline">${e.tags.map(t=>JOBS[t].label).join(" · ")}</div><div class="cost">${money(e.cost)}</div></div>
    <div class="r2"><span class="mono">${fmt(e.odometer)} km</span><span class="dot"></span><span>${niceDate(e.date)}</span><span class="dot"></span><span>${e.workshop}</span></div>
    <div class="jobs">${e.tags.map(t=>`<span class="jtag">${JOBS[t].icon} ${JOBS[t].label}</span>`).join("")}</div>
    ${e.notes?`<div class="notes">📝 ${e.notes}</div>`:""}
    <div class="actions"><button class="mini" onclick="event.stopPropagation();openAdd(${e.id})">Edit</button><button class="mini del" onclick="event.stopPropagation();delEntry(${e.id})">Delete</button></div>
  </div>`;
}
function mrow(t){
  const {s,txt,p}=statusLine(t),iv=INTERVALS[t];
  const barc=p.status==="over"?"var(--red)":p.status==="soon"?"var(--amber)":p.status==="ok"?"var(--green)":"var(--grey)";
  return `<div class="mrow">
    <div class="h"><span class="ico">${JOBS[t].icon}</span><span class="nm">${JOBS[t].label}</span><span class="st ${s.cls.replace('s-','s-')}" style="background:${statusBg(p.status)};color:${statusFg(p.status)}">${s.mk} ${s.w}</span></div>
    ${p.status!=="none"?`<div class="bar"><i style="width:${p.pct}%;background:${barc}"></i></div>
      <div class="meta"><span>${txt}</span><span>every ${fmt(iv.km)} km</span></div>`:
      `<div class="anchor" style="margin-top:10px">No history yet — tap + to log your last ${JOBS[t].label.toLowerCase()}.</div>`}
    ${p.anchor?`<div class="anchor">↳ from a “before I started logging” anchor</div>`:""}
    ${iv.timeHint&&p.status!=="none"?`<div class="cap">⏱ also due by time (~every ${iv.timeHint} months) — check your manual</div>`:""}
  </div>`;
}
function statusBg(s){return {over:"var(--red-soft)",soon:"var(--amber-soft)",ok:"var(--green-soft)",none:"var(--grey-soft)"}[s];}
function statusFg(s){return {over:"var(--red)",soon:"var(--amber)",ok:"var(--green)",none:"var(--muted)"}[s];}

function setFilter(t){filterTag=t;go("history");}
function refreshHistoryList(){
  let list=live().slice().sort((a,b)=>b.date.localeCompare(a.date));
  if(filterTag)list=list.filter(e=>e.tags.includes(filterTag));
  if(searchQ){const q=searchQ.toLowerCase();list=list.filter(e=>e.workshop.toLowerCase().includes(q)||e.notes.toLowerCase().includes(q)||e.tags.some(t=>JOBS[t].label.toLowerCase().includes(q)));}
  document.getElementById("hlist").innerHTML=list.length?list.map(entryCard).join(""):`<div class="empty">No services match.</div>`;
}

/* ============ ADD / EDIT SHEET ============ */
let picked=new Set(), editId=null;
function openAdd(id){
  editId=id||null; const e=id?state.entries.find(x=>x.id===id):null;
  picked=new Set(e?e.tags:[]);
  document.getElementById("sheetTitle").textContent=e?"Edit service":"Add service";
  const cur=currentKm();
  document.getElementById("sheetBody").innerHTML=`
    <div class="row">
      <div><label>Date</label><input type="date" id="fDate" value="${e?e.date:"2026-07-10"}"></div>
      <div><label>Odometer (km)</label><input inputmode="numeric" id="fOdo" placeholder="${fmt(cur)}" value="${e?e.odometer:""}" oninput="odoCheck(${cur})"></div>
    </div>
    <div class="warn" id="odoWarn"></div>
    <div class="row">
      <div><label>Workshop</label><input id="fShop" placeholder="e.g. Speedy Lube" value="${e?e.workshop:""}"></div>
      <div><label>Cost (${state.car.currency})</label><input inputmode="decimal" id="fCost" placeholder="0" value="${e?e.cost:""}"></div>
    </div>
    <label>What was done? <span class="faint" style="font-weight:500">· tick all</span></label>
    <div class="jobpick" id="jobPick">${Object.keys(JOBS).map(t=>`<div class="jp ${picked.has(t)?'on':''}" data-t="${t}" onclick="togJob('${t}')">${JOBS[t].icon} ${JOBS[t].label}</div>`).join("")}</div>
    <label>Notes <span class="faint" style="font-weight:500">· optional</span></label>
    <textarea id="fNotes" rows="2" placeholder="Anything worth remembering…">${e?e.notes:""}</textarea>
    <button class="btn btn-primary" style="margin-top:18px" onclick="saveEntry()">${e?"Save changes":"Save service"}</button>
    ${e?"":`<p class="tiny faint" style="text-align:center;margin-top:10px">Ticking a job resets its “next due” clock automatically.</p>`}`;
  document.getElementById("sheet").classList.add("show");
}
function togJob(t){picked.has(t)?picked.delete(t):picked.add(t);document.querySelector(`.jp[data-t="${t}"]`).classList.toggle("on");}
function odoCheck(cur){
  const v=+document.getElementById("fOdo").value, w=document.getElementById("odoWarn");
  if(v&&v>cur+50000){w.innerHTML="⚠️ That's a big jump from "+fmt(cur)+" km — double-check for a typo.";w.classList.add("show");}
  else if(v&&v<cur-2000){w.innerHTML="⚠️ Lower than your latest reading ("+fmt(cur)+" km). Fine for an old receipt, just checking.";w.classList.add("show");}
  else w.classList.remove("show");
}
function saveEntry(){
  const date=document.getElementById("fDate").value||"2026-07-10";
  const odo=parseInt(document.getElementById("fOdo").value)||null;
  const shop=document.getElementById("fShop").value.trim()||"—";
  const cost=parseFloat(document.getElementById("fCost").value)||0;
  const notes=document.getElementById("fNotes").value.trim();
  if(!picked.size){toast("Tick at least one job first");return;}
  if(editId){const e=state.entries.find(x=>x.id===editId);Object.assign(e,{date,odometer:odo,workshop:shop,cost,tags:[...picked],notes});}
  else{state.entries.push({id:++uid,date,odometer:odo,workshop:shop,cost,tags:[...picked],notes});}
  closeSheet(); go("history");
  toast(editId?"Saved ✓":"Service saved ✓ · predictions updated");
}
function delEntry(id){
  const i=state.entries.findIndex(x=>x.id===id); lastDeleted={e:state.entries[i],i};
  state.entries.splice(i,1); refreshHistoryList();
  const t=document.getElementById("toast");t.innerHTML=`Service deleted <button onclick="undoDel()">Undo</button>`;
  t.classList.add("show"); clearTimeout(undoTimer); undoTimer=setTimeout(()=>t.classList.remove("show"),6000);
}
function undoDel(){if(lastDeleted){state.entries.splice(lastDeleted.i,0,lastDeleted.e);lastDeleted=null;go('history');toast("Restored ✓");}}
function closeSheet(){document.getElementById("sheet").classList.remove("show");}

/* ============ SETTINGS ============ */
function openSettings(){
  document.getElementById("sheetTitle").textContent="Settings";
  document.getElementById("sheetBody").innerHTML=`
    <div class="backup"><div class="ic">🛟</div><div style="flex:1"><div style="font-weight:700;font-size:14px">Backed up 4 days ago</div><div class="tiny muted">Your history lives only on this device.</div></div></div>
    <button class="btn btn-primary" onclick="toast('Backup saved ✓ · car-service-backup.json')">Back up now</button>
    <button class="btn btn-lite" style="margin-top:10px" onclick="toast('Choose a backup file to restore…')">Restore from file</button>
    <div class="slab" style="margin-top:20px">Car profile</div>
    <div class="setrow"><div class="l"><div class="n">${state.car.nick}</div><div class="d">${state.car.year} ${state.car.make} ${state.car.model}</div></div><button class="mini" onclick="toast('Edit car (mockup)')">Edit</button></div>
    <div class="setrow"><div class="l"><div class="n">Plate</div><div class="d">${state.car.plate}</div></div></div>
    <div class="setrow"><div class="l"><div class="n">Currency</div><div class="d">Shown on every cost</div></div><div class="mono">${state.car.currency}</div></div>
    <div class="slab" style="margin-top:12px">Appearance</div>
    <div class="setrow"><div class="l"><div class="n">Dark mode</div><div class="d">Easy on the eyes at night</div></div>
      <button class="switch ${document.documentElement.getAttribute('data-theme')==='dark'?'on':''}" id="darkSw" onclick="toggleTheme(true)"><i></i></button></div>
    <p class="tiny faint" style="text-align:center;margin-top:20px">Mockup · not all buttons are wired.</p>`;
  document.getElementById("sheet").classList.add("show");
}

/* ============ TOAST / THEME / SPLASH ============ */
let tT;
function toast(msg){const t=document.getElementById("toast");t.innerHTML=msg;t.classList.add("show");clearTimeout(tT);clearTimeout(undoTimer);tT=setTimeout(()=>t.classList.remove("show"),2200);}
function toggleTheme(fromSheet){
  const cur=document.documentElement.getAttribute("data-theme"),next=cur==="dark"?"light":"dark";
  document.documentElement.setAttribute("data-theme",next);try{localStorage.setItem("csh-hub-theme",next)}catch(e){}
  const sw=document.getElementById("darkSw");if(sw)sw.classList.toggle("on",next==="dark");
}
function enterApp(){document.getElementById("splash").classList.add("hide");}
/* splash odometer roll */
(function(){
  const target=currentKm(),el=document.getElementById("odoRoll"),arc=document.getElementById("gArc"),C=327;
  const start=performance.now(),dur=1400;
  function step(now){
    const p=Math.min(1,(now-start)/dur),e=1-Math.pow(1-p,3);
    el.textContent=Math.round(target*e).toLocaleString("en-US");
    arc.setAttribute("stroke-dashoffset",C*(1-e*0.72));
    if(p<1)requestAnimationFrame(step); else document.getElementById("splashGo").classList.add("show");
  }
  requestAnimationFrame(step);
})();

/* init */
go("history");
</script>
</body>
</html>
