<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Design Spec — Car Service History</title>
<style>
  :root{--bg:#eef1f5;--card:#fff;--ink:#161a20;--muted:#68707d;--line:#e4e8ee;--accent:#2f6df6;--shadow:0 10px 30px rgba(20,30,50,.08);--green:#16a34a;--radius:16px}
  html[data-theme="dark"]{--bg:#0e1116;--card:#171c23;--ink:#e9edf3;--muted:#93a0b1;--line:#242b34;--accent:#5b8cff;--shadow:0 12px 34px rgba(0,0,0,.45)}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.6}
  .top{position:sticky;top:0;z-index:5;backdrop-filter:blur(10px);background:color-mix(in srgb,var(--bg) 86%,transparent);border-bottom:1px solid var(--line)}
  .topin{max-width:1000px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 18px}
  .brand{display:flex;align-items:center;gap:11px}
  .logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--accent),#8ab0ff);display:grid;place-items:center;color:#fff;font-size:18px;box-shadow:var(--shadow)}
  h1{font-size:18px;margin:0}
  .sub{color:var(--muted);font-size:12px}
  a.back{color:var(--accent);text-decoration:none}
  .toggle{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:999px;padding:7px 12px;font-size:13px;cursor:pointer}
  .layout{max-width:1000px;margin:0 auto;display:grid;grid-template-columns:230px 1fr;gap:26px;padding:22px 18px 90px}
  nav{position:sticky;top:70px;align-self:start;font-size:13.3px;max-height:calc(100vh - 90px);overflow:auto}
  nav a{display:block;color:var(--muted);text-decoration:none;padding:5px 9px;border-radius:8px;border-left:2px solid transparent}
  nav a:hover{color:var(--ink);background:var(--card)}
  nav a.on{color:var(--accent);border-left-color:var(--accent);font-weight:600}
  #doc{min-width:0}
  #doc h2{font-size:19px;margin:30px 0 10px;padding-top:8px;letter-spacing:-.2px}
  #doc h2:first-child{margin-top:0}
  #doc h3{font-size:15.5px;margin:18px 0 8px}
  #doc p{margin:.55em 0;font-size:14.5px}
  #doc ul,#doc ol{margin:.5em 0;padding-left:22px}
  #doc li{margin:5px 0;font-size:14.3px}
  #doc code{background:color-mix(in srgb,var(--accent) 12%,transparent);color:var(--accent);padding:1.5px 6px;border-radius:6px;font-size:12.8px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  #doc pre{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;overflow:auto;box-shadow:var(--shadow)}
  #doc pre code{background:none;color:var(--ink);padding:0;font-size:12.6px;line-height:1.5}
  #doc blockquote{margin:.6em 0;padding:10px 16px;border-left:4px solid var(--accent);background:color-mix(in srgb,var(--accent) 8%,transparent);border-radius:0 12px 12px 0;color:var(--ink)}
  #doc blockquote p{font-size:13.8px}
  #doc hr{border:none;border-top:1px solid var(--line);margin:22px 0}
  #doc table{border-collapse:collapse;width:100%;margin:12px 0;font-size:13.6px;display:block;overflow-x:auto}
  #doc th,#doc td{border:1px solid var(--line);padding:8px 11px;text-align:left;vertical-align:top}
  #doc th{background:var(--card);font-weight:700}
  .sect{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:6px 20px 16px;margin-bottom:14px}
  .tag-R,.tag-D{font-size:10.5px;font-weight:800;padding:1px 6px;border-radius:5px;vertical-align:middle;margin-left:5px}
  .tag-R{background:color-mix(in srgb,var(--green) 16%,transparent);color:var(--green)}
  .tag-D{background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent)}
  .loading{padding:60px 20px;text-align:center;color:var(--muted)}
  @media(max-width:760px){.layout{grid-template-columns:1fr}nav{display:none}}
</style>
</head>
<body>
<div class="top"><div class="topin">
  <div class="brand"><div class="logo">📄</div><div><h1>Design Spec <span style="color:var(--muted);font-weight:400">v2 · hardened</span></h1><div class="sub"><a class="back" href="../index.html">‹ Project hub</a> · Car Service History</div></div></div>
  <button class="toggle" id="themeBtn">🌙 Dark</button>
</div></div>

<div class="layout">
  <nav id="toc"></nav>
  <main id="doc"><div class="loading">Loading spec…</div></main>
</div>

<script>
const html=document.documentElement,btn=document.getElementById('themeBtn');
function applyTheme(t){html.setAttribute('data-theme',t);btn.textContent=t==='dark'?'☀️ Light':'🌙 Dark';try{localStorage.setItem('csh-hub-theme',t)}catch(e){}}
try{applyTheme(localStorage.getItem('csh-hub-theme')||'light')}catch(e){applyTheme('light')}
btn.onclick=()=>applyTheme(html.getAttribute('data-theme')==='dark'?'light':'dark');

// --- tiny, controlled markdown renderer (subset used by our spec) ---
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function inline(s){
  s=esc(s);
  s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
  s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/\[R\]/g,'<span class="tag-R">FIX</span>').replace(/\[D\]/g,'<span class="tag-D">YOUR CALL</span>');
  return s;
}
function render(md){
  const lines=md.replace(/\r/g,'').split('\n');
  let html='',i=0,slug=0;const toc=[];
  function closeList(state){if(state.list){html+='</'+state.list+'>';state.list=null}}
  const st={list:null};
  while(i<lines.length){
    let ln=lines[i];
    if(/^```/.test(ln)){closeList(st);i++;let code='';while(i<lines.length&&!/^```/.test(lines[i])){code+=lines[i]+'\n';i++}i++;html+='<pre><code>'+esc(code.replace(/\n$/,''))+'</code></pre>';continue}
    if(/^\|/.test(ln)){ // table
      closeList(st);const tbl=[];while(i<lines.length&&/^\|/.test(lines[i])){tbl.push(lines[i]);i++}
      const rows=tbl.filter(r=>!/^\|[\s:|-]+\|?\s*$/.test(r));
      html+='<table>';rows.forEach((r,ri)=>{const cells=r.split('|').slice(1,-1).map(c=>c.trim());const tag=ri===0?'th':'td';html+='<tr>'+cells.map(c=>'<'+tag+'>'+inline(c)+'</'+tag+'>').join('')+'</tr>'});html+='</table>';continue}
    if(/^#{1,3}\s/.test(ln)){
      closeList(st);const lvl=ln.match(/^#+/)[0].length;const txt=ln.replace(/^#+\s/,'');
      if(lvl===1){i++;continue} // skip doc title (already in header)
      const id='s'+(slug++);if(lvl===2)toc.push({id,txt});
      html+='<h'+lvl+' id="'+id+'">'+inline(txt)+'</h'+lvl+'>';i++;continue}
    if(/^>\s?/.test(ln)){closeList(st);let q='';while(i<lines.length&&/^>\s?/.test(lines[i])){q+=lines[i].replace(/^>\s?/,'')+' ';i++}html+='<blockquote><p>'+inline(q.trim())+'</p></blockquote>';continue}
    if(/^---\s*$/.test(ln)){closeList(st);html+='<hr>';i++;continue}
    if(/^\s*[-*]\s/.test(ln)){if(st.list!=='ul'){closeList(st);html+='<ul>';st.list='ul'}html+='<li>'+inline(ln.replace(/^\s*[-*]\s/,''))+'</li>';i++;continue}
    if(/^\s*\d+\.\s/.test(ln)){if(st.list!=='ol'){closeList(st);html+='<ol>';st.list='ol'}html+='<li>'+inline(ln.replace(/^\s*\d+\.\s/,''))+'</li>';i++;continue}
    if(/^\s*$/.test(ln)){closeList(st);i++;continue}
    closeList(st);html+='<p>'+inline(ln)+'</p>';i++;
  }
  closeList(st);
  return {html,toc};
}
function group(h){ // wrap each h2..next-h2 in a .sect card
  const parts=h.split(/(?=<h2 )/);return parts.map(p=>p.startsWith('<h2')?'<section class="sect">'+p+'</section>':p).join('');
}
fetch('../docs/superpowers/specs/2026-07-10-car-service-history-design.md')
 .then(r=>{if(!r.ok)throw new Error(r.status);return r.text()})
 .then(md=>{
   const {html:body,toc}=render(md);
   document.getElementById('doc').innerHTML=group(body);
   document.getElementById('toc').innerHTML=toc.map(t=>'<a href="#'+t.id+'">'+t.txt.replace(/<[^>]+>/g,'').replace(/\s*\d+[a-z]?\.\s*/,'').slice(0,34)+'</a>').join('');
   // scrollspy
   const links=[...document.querySelectorAll('#toc a')],heads=toc.map(t=>document.getElementById(t.id));
   const io=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){const idx=heads.indexOf(e.target);links.forEach(l=>l.classList.remove('on'));if(links[idx])links[idx].classList.add('on')}})},{rootMargin:'-70px 0px -70% 0px'});
   heads.forEach(h=>h&&io.observe(h));
 })
 .catch(e=>{document.getElementById('doc').innerHTML='<div class="loading">Could not load the spec ('+e.message+'). It may still be deploying — refresh in a minute.</div>'});
</script>
</body>
</html>
